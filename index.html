<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>月影塔罗店 · 传统占卜</title>
  <style>
    :root {
      --bg:#0f0918;
      --purple:#2a1740;
      --gold:#e8c57a;
      --ink:#f8f1df;
      --muted:#ccbce0;
      --line:rgba(232,197,122,.45);
      --panel:rgba(22,12,34,.72);
      --ok:#8ff2d0;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; color:var(--ink);
      font-family:"Noto Serif SC","Microsoft YaHei",serif;
      background:
        radial-gradient(circle at 12% 10%,rgba(241,183,72,.18),transparent 35%),
        radial-gradient(circle at 90% 15%,rgba(106,68,170,.25),transparent 40%),
        linear-gradient(170deg,#120b1c, #1f1230 55%, #140b20);
      overflow-x:hidden;
    }
    .shop-bg{
      position:fixed; inset:0; pointer-events:none; opacity:.24;
      background-image:
        linear-gradient(to right, transparent 4%, rgba(255,255,255,.03) 4.2%, transparent 4.5%),
        linear-gradient(to bottom, rgba(232,197,122,.14), transparent 30%),
        radial-gradient(circle at 20% 65%, rgba(210,150,80,.25), transparent 36%),
        radial-gradient(circle at 80% 70%, rgba(85,126,212,.19), transparent 35%);
      filter:blur(1px);
    }
    .stars::before,.stars::after{
      content:""; position:fixed; inset:0; pointer-events:none;
      background-image:radial-gradient(circle,rgba(255,255,255,.72) 1px,transparent 1.2px);
      background-size:4px 4px; opacity:.11; animation:drift 26s linear infinite;
    }
    .stars::after{opacity:.07; animation-duration:40s; transform:scale(1.25)}
    @keyframes drift{from{transform:translateY(0)}to{transform:translateY(-26px)}}

    .wrap{width:min(1050px,94vw); margin:28px auto 40px; position:relative; z-index:2}
    .hero{
      border:1px solid var(--line); border-radius:22px; padding:22px;
      background:linear-gradient(180deg,var(--panel),rgba(18,10,28,.55));
      backdrop-filter:blur(6px);
      box-shadow:0 16px 38px rgba(0,0,0,.42), inset 0 0 0 1px rgba(255,255,255,.04);
    }

    h1{margin:0 0 6px; font-size:clamp(1.5rem,2.5vw,2.2rem); color:var(--gold); letter-spacing:.06em}
    .sub{margin:0; color:var(--muted); line-height:1.75}

    .panel{margin-top:16px; border:1px solid rgba(232,197,122,.34); background:rgba(255,255,255,.05); border-radius:14px; padding:16px}
    label{display:block; margin-bottom:8px; color:var(--muted)}
    input,textarea,select,button{
      width:100%; border:1px solid rgba(255,255,255,.22); border-radius:10px;
      background:rgba(14,9,22,.76); color:#fff; font:inherit; padding:11px 13px;
    }
    textarea{min-height:90px; resize:vertical}
    button{
      cursor:pointer; border-color:rgba(232,197,122,.56);
      background:linear-gradient(180deg,rgba(232,197,122,.21),rgba(232,197,122,.08));
      transition:.2s transform,.2s box-shadow;
    }
    button:hover{transform:translateY(-1px); box-shadow:0 8px 20px rgba(0,0,0,.35)}
    .row{display:grid; gap:12px; grid-template-columns:1fr}
    @media(min-width:760px){.row.two{grid-template-columns:1fr 1fr}}

    .hidden{display:none}
    .status{margin-top:8px; color:var(--ok); font-size:.95rem}

    .spread-guide{display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; color:#ddd2ef; font-size:.9rem}
    .spread-guide span{padding:3px 8px; border:1px solid rgba(255,255,255,.2); border-radius:999px}

    .cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:14px; margin-top:12px}
    .tarot-card-wrap{perspective:1000px; min-height:270px}
    .tarot-card{
      position:relative; width:100%; height:100%; min-height:270px;
      transform-style:preserve-3d; transition:transform .75s ease;
    }
    .tarot-card.revealed{transform:rotateY(180deg)}
    .face{
      position:absolute; inset:0; border-radius:14px; backface-visibility:hidden;
      border:1px solid rgba(232,197,122,.46); overflow:hidden;
      box-shadow:0 10px 24px rgba(0,0,0,.38), inset 0 0 0 1px rgba(255,255,255,.05);
    }
    .back{
      background:
        radial-gradient(circle at 50% 30%, rgba(232,197,122,.25), transparent 35%),
        linear-gradient(165deg,#321d4b,#1b112b);
      display:flex; align-items:center; justify-content:center; flex-direction:column;
      font-size:1rem; color:#f5e9ca; letter-spacing:.06em;
    }
    .back .glyph{font-size:2rem; margin-bottom:10px}

    .front{
      transform:rotateY(180deg);
      background:linear-gradient(180deg,#2a163f,#1a1029);
      padding:14px;
    }
    .tag{display:inline-block; font-size:.8rem; padding:2px 8px; border-radius:999px; border:1px solid rgba(255,255,255,.2); color:#e6dcf8}
    .front h3{margin:.55rem 0 .4rem; color:var(--gold); font-size:1.06rem}
    .front p{margin:.2rem 0; line-height:1.68}

    .summary{margin-top:14px; border-top:1px dashed rgba(232,197,122,.4); padding-top:10px; line-height:1.8}
    .footer{text-align:center; color:#b7a8cb; margin-top:14px; font-size:.86rem}
  </style>
</head>
<body>
  <div class="shop-bg"></div>
  <div class="stars"></div>

  <div class="wrap">
    <section class="hero">
      <h1>🔮 月影塔罗店</h1>
      <p class="sub">传统流程：记录名字 → 书写问题 → 洗牌开牌（三张）→ 结合牌位解读。</p>

      <div class="panel" id="step1">
        <label for="name">1）你的名字</label>
        <div class="row two">
          <input id="name" placeholder="请输入名字，例如：甜甜" />
          <button id="nextBtn">进入提问</button>
        </div>
        <div class="status" id="nameStatus"></div>
      </div>

      <div class="panel hidden" id="step2">
        <label for="question">2）你想占卜的问题</label>
        <textarea id="question" placeholder="比如：我接下来三个月在科研、财富、内容创作上的关键机会是什么？"></textarea>
        <div class="row two" style="margin-top:10px;">
          <select id="spread">
            <option value="past-present-future">传统三牌阵（过去 / 现在 / 未来）</option>
            <option value="situation-action-outcome">情境三牌阵（现状 / 建议 / 结果）</option>
          </select>
          <button id="drawBtn">洗牌并开牌</button>
        </div>
        <div class="spread-guide" id="spreadGuide"></div>
      </div>

      <div class="panel hidden" id="resultPanel">
        <h2 id="title" style="margin:0;color:var(--gold)"></h2>
        <p id="questionEcho" style="color:#d8cde9"></p>
        <div class="cards" id="cards"></div>
        <div class="summary" id="summary"></div>
        <div class="row two" style="margin-top:12px;">
          <button id="redrawBtn">重新洗牌</button>
          <button id="resetBtn">开始新的占卜</button>
        </div>
      </div>

      <p class="footer">* 本页面用于灵感与反思，不替代医疗、法律、投资等专业建议。</p>
    </section>
  </div>

  <script>
    const deck = [
      { name: "愚者", up: "新旅程开启，适合大胆尝试", rev: "冲动冒进，先补齐信息" },
      { name: "魔术师", up: "资源齐备，执行会出结果", rev: "分心消耗，行动力打折" },
      { name: "女祭司", up: "直觉很准，先观察再决定", rev: "想太多导致拖延" },
      { name: "女皇", up: "稳步增长，适合长期布局", rev: "过度舒适影响节奏" },
      { name: "皇帝", up: "建立规则，靠系统取胜", rev: "控制过强导致僵化" },
      { name: "教皇", up: "借助导师与体系学习", rev: "被旧框架束缚" },
      { name: "恋人", up: "关键选择要与价值一致", rev: "优柔寡断，内耗增加" },
      { name: "战车", up: "推进力很强，适合冲刺", rev: "急躁导致偏航" },
      { name: "力量", up: "温和但坚定，能稳住局面", rev: "情绪波动影响判断" },
      { name: "隐者", up: "沉淀思考，独立判断", rev: "封闭过头，错失反馈" },
      { name: "命运之轮", up: "周期转机，抓住窗口", rev: "波动加大，先控风险" },
      { name: "正义", up: "理性评估，按规则行动", rev: "信息偏差，结论失真" },
      { name: "倒吊人", up: "换角度会看到答案", rev: "停滞太久，需主动破局" },
      { name: "死神", up: "旧阶段结束，利于重启", rev: "抗拒变化拖慢进展" },
      { name: "节制", up: "整合资源，稳中求进", rev: "节奏失衡，效率下降" },
      { name: "恶魔", up: "欲望驱动强，警惕执念", rev: "摆脱依赖，重获主动" },
      { name: "高塔", up: "突发重构，打破旧秩序", rev: "隐患已久，尽快修复" },
      { name: "星星", up: "愿景清晰，值得坚持", rev: "理想化，落地不足" },
      { name: "月亮", up: "迷雾与不确定并存", rev: "真相逐渐浮现" },
      { name: "太阳", up: "高能见度与积极回报", rev: "过度乐观忽略细节" },
      { name: "审判", up: "复盘唤醒新的机会", rev: "犹豫不决错过时机" },
      { name: "世界", up: "阶段圆满，准备升级", rev: "收尾不足，功亏一篑" }
    ];

    const spreadMap = {
      "past-present-future": ["过去", "现在", "未来"],
      "situation-action-outcome": ["现状", "建议行动", "结果趋势"]
    };

    const $ = (id) => document.getElementById(id);
    const state = { name: "", question: "" };

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function draw3() {
      return shuffle(deck).slice(0, 3).map((c) => {
        const reversed = Math.random() < 0.42;
        return { ...c, ori: reversed ? "逆位" : "正位", meaning: reversed ? c.rev : c.up };
      });
    }

    function renderGuide(type) {
      const labels = spreadMap[type];
      $("spreadGuide").innerHTML = labels.map((l) => `<span>${l}</span>`).join("");
    }

    function renderResult(cards, spread) {
      const labels = spreadMap[spread];
      $("title").textContent = `${state.name} 的牌面`;
      $("questionEcho").innerHTML = `你的问题：<em>${state.question}</em>`;

      $("cards").innerHTML = cards.map((c, i) => `
        <div class="tarot-card-wrap">
          <article class="tarot-card" data-i="${i}">
            <section class="face back">
              <div class="glyph">✦</div>
              <div>月影塔罗</div>
              <small style="opacity:.8;margin-top:6px">点击翻开</small>
            </section>
            <section class="face front">
              <span class="tag">${labels[i]}</span>
              <h3>${c.name} · ${c.ori}</h3>
              <p>${c.meaning}</p>
            </section>
          </article>
        </div>
      `).join("");

      const summary = `
        <strong>综合启示：</strong><br>
        ① ${labels[0]}出现 <b>${cards[0].name}${cards[0].ori}</b>，先复盘过去策略。<br>
        ② ${labels[1]}是 <b>${cards[1].name}${cards[1].ori}</b>，当下关键在执行方式。<br>
        ③ ${labels[2]}落在 <b>${cards[2].name}${cards[2].ori}</b>，未来趋势由你持续行动塑造。<br><br>
        建议：把问题拆成 1 个“今日动作 + 本周动作 + 本月目标”，让牌意变成现实成果。
      `;
      $("summary").innerHTML = summary;

      setTimeout(() => {
        document.querySelectorAll('.tarot-card').forEach((el, idx) => {
          setTimeout(() => el.classList.add('revealed'), idx * 260);
          el.addEventListener('click', () => el.classList.toggle('revealed'));
        });
      }, 120);
    }

    $("nextBtn").addEventListener("click", () => {
      const n = $("name").value.trim();
      if (!n) {
        $("nameStatus").textContent = "请先告诉我你的名字。";
        return;
      }
      state.name = n;
      $("nameStatus").textContent = `欢迎你，${n}。请写下你最想问的问题。`;
      $("step2").classList.remove("hidden");
      $("question").focus();
    });

    $("spread").addEventListener('change', (e) => renderGuide(e.target.value));

    $("drawBtn").addEventListener("click", () => {
      const q = $("question").value.trim();
      if (!state.name) return $("nameStatus").textContent = "请先填写名字。";
      if (!q) return alert("请先输入你要占卜的问题。");
      state.question = q;
      const spread = $("spread").value;
      const cards = draw3();
      renderResult(cards, spread);
      $("resultPanel").classList.remove("hidden");
      $("resultPanel").scrollIntoView({ behavior: "smooth", block: "start" });
    });

    $("redrawBtn").addEventListener("click", () => $("drawBtn").click());

    $("resetBtn").addEventListener("click", () => {
      state.name = ""; state.question = "";
      $("name").value = "";
      $("question").value = "";
      $("nameStatus").textContent = "";
      $("step2").classList.add("hidden");
      $("resultPanel").classList.add("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    renderGuide($("spread").value);
  </script>
</body>
</html>
