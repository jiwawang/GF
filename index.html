<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>月影塔罗店</title>
  <style>
    :root{
      --gold:#e7c179;
      --ink:#f6f0df;
      --muted:#cdbde2;
      --line:rgba(231,193,121,.42);
      --panel:rgba(20,12,31,.62);
    }
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;overflow:hidden;color:var(--ink);
      font-family:"Noto Serif SC","Microsoft YaHei",serif;
      background:#130b20;
    }

    .bg{
      position:fixed;inset:-3%;
      background:
        radial-gradient(circle at 18% 72%, rgba(208,143,74,.32), transparent 34%),
        radial-gradient(circle at 84% 18%, rgba(106,73,178,.34), transparent 38%),
        radial-gradient(circle at 50% 30%, rgba(255,255,255,.08), transparent 42%),
        linear-gradient(170deg, #27143a 0%, #130b20 68%);
      filter: blur(13px) saturate(1.1);
      transform:scale(1.06);
      animation:bgBreath 9s ease-in-out infinite alternate;
    }
    @keyframes bgBreath{from{transform:scale(1.05)}to{transform:scale(1.09)}}

    .mist{
      position:fixed;inset:0;pointer-events:none;
      background:radial-gradient(circle at 50% 80%, rgba(255,255,255,.08), transparent 55%);
      mix-blend-mode:screen;
      animation:mistMove 14s ease-in-out infinite alternate;
    }
    @keyframes mistMove{from{transform:translateY(8px)}to{transform:translateY(-12px)}}

    .stars::before,.stars::after{
      content:"";position:fixed;inset:0;pointer-events:none;
      background-image:radial-gradient(circle, rgba(255,255,255,.78) 1px, transparent 1.2px);
      background-size:4px 4px;opacity:.08;
      animation:drift 34s linear infinite;
    }
    .stars::after{opacity:.05;transform:scale(1.3);animation-duration:50s}
    @keyframes drift{from{transform:translateY(0)}to{transform:translateY(-32px)}}

    .shell{position:relative;z-index:2;width:min(1150px,95vw);height:100vh;margin:0 auto;padding:20px 12px 24px}

    .topbar{
      border:1px solid var(--line);border-radius:14px;padding:10px 12px;
      background:linear-gradient(180deg,var(--panel),rgba(17,10,27,.42));
      backdrop-filter:blur(7px);
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      box-shadow:0 8px 28px rgba(0,0,0,.35);
    }
    .brand{color:var(--gold);font-size:1.06rem;letter-spacing:.08em}
    .top-actions{display:flex;gap:8px;flex-wrap:wrap}
    button{
      border:1px solid rgba(231,193,121,.56);border-radius:10px;padding:8px 12px;
      background:linear-gradient(180deg, rgba(231,193,121,.24), rgba(231,193,121,.09));
      color:#fff;cursor:pointer;font:inherit;
    }

    .stage{
      position:relative;height:calc(100% - 70px);margin-top:14px;border:1px solid rgba(231,193,121,.3);
      border-radius:18px;background:linear-gradient(180deg,rgba(18,10,29,.45),rgba(13,8,20,.32));
      backdrop-filter: blur(4px);
      overflow:hidden;
    }

    .hint{
      position:absolute;left:50%;top:18px;transform:translateX(-50%);
      background:rgba(15,9,24,.72);border:1px solid rgba(255,255,255,.16);border-radius:999px;
      padding:6px 12px;color:#ddd1ef;font-size:.9rem;z-index:8;
    }

    /* floating ambient cards */
    .ambient{position:absolute;inset:0;pointer-events:none;z-index:1}
    .ambient .a-card{
      position:absolute;width:116px;height:178px;border-radius:11px;
      border:1px solid rgba(231,193,121,.45);
      background:
        radial-gradient(circle at 50% 24%, rgba(231,193,121,.27), transparent 36%),
        linear-gradient(165deg,#321d4a,#1a1128);
      box-shadow:0 10px 22px rgba(0,0,0,.4), inset 0 0 0 1px rgba(255,255,255,.05);
      opacity:.62;
      animation:float var(--t) ease-in-out infinite alternate;
      transform:translate3d(0,0,0) rotate(var(--r));
      filter:drop-shadow(0 0 6px rgba(244,202,131,.2));
    }
    .ambient .a-card::after{content:"✦";position:absolute;inset:0;display:grid;place-items:center;color:#f4e5c2;opacity:.6}
    @keyframes float{
      0%{transform:translateY(0) translateX(0) rotate(var(--r))}
      50%{transform:translateY(-16px) translateX(8px) rotate(calc(var(--r) + 4deg))}
      100%{transform:translateY(10px) translateX(-6px) rotate(calc(var(--r) - 3deg))}
    }

    .deck-zone{position:absolute;inset:0;display:grid;place-items:center;z-index:3}
    .deck-stack{position:relative;width:170px;height:250px}
    .deck-card{
      position:absolute;inset:0;border-radius:12px;border:1px solid rgba(231,193,121,.55);
      background:linear-gradient(165deg,#331f4d,#1a1029);
      box-shadow:0 14px 30px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.05);
    }
    .deck-card:nth-child(1){transform:translate(-8px,8px) rotate(-5deg);opacity:.8}
    .deck-card:nth-child(2){transform:translate(8px,8px) rotate(6deg);opacity:.8}
    .deck-card:nth-child(3){display:grid;place-items:center;font-size:1.02rem;letter-spacing:.08em}

    .shuffling .deck-card:nth-child(1){animation:slideL .62s ease-in-out infinite alternate}
    .shuffling .deck-card:nth-child(2){animation:slideR .62s ease-in-out infinite alternate}
    .shuffling .deck-card:nth-child(3){animation:deckPulse .8s ease-in-out infinite alternate}
    @keyframes slideL{from{transform:translate(-14px,10px) rotate(-10deg)}to{transform:translate(-1px,4px) rotate(-1deg)}}
    @keyframes slideR{from{transform:translate(12px,10px) rotate(11deg)}to{transform:translate(1px,4px) rotate(1deg)}}
    @keyframes deckPulse{from{transform:scale(1)}to{transform:scale(1.04)}}

    .fan{position:absolute;left:50%;top:53%;transform:translate(-50%,-50%);display:flex;gap:12px;z-index:6}
    .fan.hidden{display:none}
    .choice{
      width:150px;height:225px;border-radius:12px;cursor:pointer;
      border:1px solid rgba(231,193,121,.56);
      background:
        radial-gradient(circle at 50% 24%, rgba(231,193,121,.27), transparent 34%),
        linear-gradient(165deg,#311d49,#1a1028);
      box-shadow:0 12px 24px rgba(0,0,0,.42);
      transform:rotate(var(--r)) translateY(var(--y));
      transition:.2s transform,.2s opacity,.2s filter;
      display:grid;place-items:center;color:#f8e8c4;letter-spacing:.06em;
    }
    .choice:hover{transform:rotate(var(--r)) translateY(calc(var(--y) - 10px));filter:brightness(1.1)}
    .choice.picked{opacity:.35;pointer-events:none}

    .result{
      position:absolute;left:50%;bottom:18px;transform:translateX(-50%);
      width:min(1020px,94%);z-index:7;
      border:1px solid var(--line);border-radius:14px;padding:12px;
      background:linear-gradient(180deg,rgba(24,14,36,.9),rgba(14,9,22,.88));
      backdrop-filter:blur(7px);
      max-height:55vh;overflow:auto;-webkit-overflow-scrolling:touch;
      display:none;
    }
    .result.show{display:block}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
    .cards article{border:1px solid rgba(231,193,121,.44);border-radius:11px;padding:10px;background:linear-gradient(180deg,#2a173f,#1a1129)}
    .card-face{width:100%;aspect-ratio:3/5;object-fit:cover;border-radius:9px;border:1px solid rgba(255,255,255,.14);margin:8px 0 6px;box-shadow:0 8px 16px rgba(0,0,0,.35)}
    .tag{display:inline-block;padding:2px 8px;border:1px solid rgba(255,255,255,.2);border-radius:999px;color:#e9ddfb;font-size:.8rem}
    .cards h3{margin:.45rem 0 .35rem;color:var(--gold)}
    .summary{margin-top:8px;border-top:1px dashed rgba(231,193,121,.4);padding-top:8px;line-height:1.72;color:#eee4ff}

    .modal{
      position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;
      background:rgba(7,4,12,.62);backdrop-filter:blur(5px);
    }
    .modal.show{display:flex}
    .dialog{
      width:min(560px,92vw);border:1px solid var(--line);border-radius:14px;padding:16px;
      background:linear-gradient(180deg,rgba(38,23,57,.96),rgba(18,10,28,.96));
      box-shadow:0 20px 48px rgba(0,0,0,.5);
    }
    .dialog h2{margin:0 0 8px;color:var(--gold)}
    .dialog label{display:block;color:var(--muted);margin-top:8px}
    .dialog input,.dialog textarea,.dialog select{
      width:100%;margin-top:6px;padding:10px;border-radius:10px;
      border:1px solid rgba(255,255,255,.2);background:rgba(11,7,18,.84);color:#fff;font:inherit;
    }
    .dialog textarea{min-height:92px;resize:vertical}
    .dialog .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}

    @media (max-width: 768px){
      body{overflow-y:auto;overflow-x:hidden}
      .shell{height:auto;min-height:100vh;padding:12px 8px 18px}
      .stage{height:auto;min-height:calc(100vh - 88px);overflow:auto;padding:8px 0 220px}
      .hint{position:relative;left:auto;top:auto;transform:none;display:table;margin:4px auto 0}
      .fan{top:44%;gap:6px;transform:translate(-50%,-50%) scale(.8)}
      .choice{width:116px;height:174px}
      .result{position:relative;left:auto;bottom:auto;transform:none;width:96%;margin:14px auto 0;max-height:none}
      .cards{grid-template-columns:1fr}
    }

  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="mist"></div>
  <div class="stars"></div>

  <audio id="bgm" loop preload="none" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_a8cd79be19.mp3?filename=relaxing-meditation-ambient-11157.mp3"></audio>

  <div class="shell">
    <div class="topbar">
      <div class="brand">✦ 月影塔罗店 ✦</div>
      <div class="top-actions">
        <button id="musicBtn">开启背景音乐</button>
        <button id="restartBtn">重新开始</button>
      </div>
    </div>

    <section class="stage" id="stage">
      <div class="hint" id="hint">静心 3 秒，再点击卡牌进行抽取</div>

      <div class="ambient" id="ambient"></div>

      <div class="deck-zone">
        <div class="deck-stack" id="deckStack">
          <div class="deck-card"></div>
          <div class="deck-card"></div>
          <div class="deck-card">月影塔罗</div>
        </div>
      </div>

      <div class="fan hidden" id="fan"></div>

      <div class="result" id="result">
        <div id="qText" style="margin-bottom:8px;color:#d8cdeb"></div>
        <div class="cards" id="cards"></div>
        <div class="summary" id="summary"></div>
      </div>
    </section>
  </div>

  <div class="modal" id="modal">
    <div class="dialog">
      <h2>月影问询</h2>
      <div id="step1">
        <label>你的名字</label>
        <input id="nameInput" placeholder="例如：甜甜" />
        <div class="actions"><button id="toStep2">下一步</button></div>
      </div>
      <div id="step2" style="display:none">
        <label>你想占卜的问题</label>
        <textarea id="questionInput" placeholder="例如：接下来三个月我在科研与财富上的关键机会是什么？"></textarea>
        <label>牌阵</label>
        <select id="spreadInput">
          <option value="past-present-future">过去 / 现在 / 未来</option>
          <option value="situation-action-outcome">现状 / 建议 / 结果</option>
        </select>
        <div class="actions">
          <button id="startBtn">开始占卜</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const deckData=[
      {name:"愚者",img:"assets/cards/RWS_Tarot_00_Fool.jpg",up:"新的旅程开启，适合勇敢尝试",rev:"冲动冒进，先补齐信息"},
      {name:"魔术师",img:"assets/cards/RWS_Tarot_01_Magician.jpg",up:"资源齐备，执行会出结果",rev:"分心消耗，行动力打折"},
      {name:"女祭司",img:"assets/cards/RWS_Tarot_02_High_Priestess.jpg",up:"直觉很准，先观察再行动",rev:"想太多导致犹豫"},
      {name:"女皇",img:"assets/cards/RWS_Tarot_03_Empress.jpg",up:"稳步增长，适合长期布局",rev:"过度舒适，节奏放缓"},
      {name:"皇帝",img:"assets/cards/RWS_Tarot_04_Emperor.jpg",up:"建立秩序，以系统取胜",rev:"控制过强导致僵化"},
      {name:"教皇",img:"assets/cards/RWS_Tarot_05_Hierophant.jpg",up:"借助导师体系加速成长",rev:"被旧框架束缚"},
      {name:"恋人",img:"assets/cards/RWS_Tarot_06_Lovers.jpg",up:"选择与价值一致",rev:"优柔寡断，内耗增加"},
      {name:"战车",img:"assets/cards/RWS_Tarot_07_Chariot.jpg",up:"推进力强，适合冲刺",rev:"急躁导致偏航"},
      {name:"力量",img:"assets/cards/RWS_Tarot_08_Strength.jpg",up:"稳定心态，柔性掌控",rev:"焦虑影响判断"},
      {name:"隐者",img:"assets/cards/RWS_Tarot_09_Hermit.jpg",up:"沉淀思考，独立判断",rev:"封闭过头错失反馈"},
      {name:"命运之轮",img:"assets/cards/RWS_Tarot_10_Wheel_of_Fortune.jpg",up:"转机出现，抓住窗口",rev:"波动增大，先控风险"},
      {name:"正义",img:"assets/cards/RWS_Tarot_11_Justice.jpg",up:"理性评估，按规则行动",rev:"信息偏差导致误判"},
      {name:"倒吊人",img:"assets/cards/RWS_Tarot_12_Hanged_Man.jpg",up:"换角度会找到答案",rev:"停滞太久需主动破局"},
      {name:"死神",img:"assets/cards/RWS_Tarot_13_Death.jpg",up:"旧阶段结束，利于重启",rev:"抗拒变化拖慢进展"},
      {name:"节制",img:"assets/cards/RWS_Tarot_14_Temperance.jpg",up:"整合资源，稳中求进",rev:"节奏失衡效率下降"},
      {name:"恶魔",img:"assets/cards/RWS_Tarot_15_Devil.jpg",up:"欲望驱动强，警惕执念",rev:"摆脱依赖重获主动"},
      {name:"高塔",img:"assets/cards/RWS_Tarot_16_Tower.jpg",up:"突发重构，打破旧模式",rev:"隐患已久，尽快修复"},
      {name:"星星",img:"assets/cards/RWS_Tarot_17_Star.jpg",up:"愿景清晰，值得坚持",rev:"理想化，落地不足"},
      {name:"月亮",img:"assets/cards/RWS_Tarot_18_Moon.jpg",up:"不确定中藏线索",rev:"迷雾散去，看清风险"},
      {name:"太阳",img:"assets/cards/RWS_Tarot_19_Sun.jpg",up:"曝光与回报同步提升",rev:"过度乐观忽视细节"},
      {name:"审判",img:"assets/cards/RWS_Tarot_20_Judgement.jpg",up:"复盘唤醒第二机会",rev:"犹豫不决错过窗口"},
      {name:"世界",img:"assets/cards/RWS_Tarot_21_World.jpg",up:"阶段圆满准备升级",rev:"收尾不足功亏一篑"}
    ];

    const spreads={
      "past-present-future":["过去","现在","未来"],
      "situation-action-outcome":["现状","建议行动","结果趋势"]
    };

    const state={name:"",question:"",spread:"past-present-future",picked:[]};
    const $=(id)=>document.getElementById(id);

    function shuffle(arr){
      const a=[...arr];
      for(let i=a.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
      }
      return a;
    }

    function buildAmbient(){
      const box=$("ambient");
      box.innerHTML="";
      for(let i=0;i<9;i++){
        const d=document.createElement('div');
        d.className='a-card';
        d.style.left=(8 + Math.random()*82)+"%";
        d.style.top=(8 + Math.random()*72)+"%";
        d.style.setProperty('--r', ((Math.random()*26)-13)+'deg');
        d.style.setProperty('--t', (4.8 + Math.random()*4.5)+'s');
        d.style.animationDelay = (-Math.random()*6)+'s';
        box.appendChild(d);
      }
    }

    function showModal(){ $("modal").classList.add('show'); }
    function hideModal(){ $("modal").classList.remove('show'); }

    function startReading(){
      const deck=$("deckStack");
      deck.classList.add('shuffling');
      $("hint").textContent=`${state.name}，正在洗牌...请专注你的问题`;
      $("fan").classList.add('hidden');
      $("result").classList.remove('show');
      state.picked=[];

      setTimeout(()=>{
        deck.classList.remove('shuffling');
        fanOut();
      },2800);
    }

    function fanOut(){
      const candidates=shuffle(deckData).slice(0,7);
      const fan=$("fan");
      fan.innerHTML=candidates.map((_,i)=>`<div class="choice" data-i="${i}" style="--r:${-18+i*6}deg;--y:${Math.abs(3-i)*2}px">月影</div>`).join('');
      fan.classList.remove('hidden');
      $("hint").textContent='请自主抽取 3 张牌';

      fan.querySelectorAll('.choice').forEach((el)=>{
        el.addEventListener('click',()=>{
          if(el.classList.contains('picked') || state.picked.length>=3) return;
          el.classList.add('picked');
          const card=candidates[Number(el.dataset.i)];
          state.picked.push(card);
          if(state.picked.length===3){
            fan.classList.add('hidden');
            reveal();
          }
        })
      })
    }

    function detectDomain(question){
      const q=question || '';
      if(/股票|投资|收益|财务|财富|钱|收入/.test(q)) return '财富';
      if(/科研|论文|博士|实验|课题|研究/.test(q)) return '科研';
      if(/感情|关系|恋爱|婚姻/.test(q)) return '关系';
      if(/工作|面试|职业|升职|项目/.test(q)) return '事业';
      return '成长';
    }

    function composeReading(cards, labels, question){
      const domain=detectDomain(question);
      const revCount=cards.filter(c=>c.ori==='逆位').length;
      const riskLine = revCount>=2
        ? '本次牌面逆位偏多，提示你要先降风险、后求速度。'
        : '本次牌面正位较多，趋势可控，适合稳步推进。';

      const nowAdvice = cards[1].ori==='逆位'
        ? '先减少分心项，把任务收敛到 1 个主线目标。'
        : '当下执行力是优势，优先做最关键的第一步。';

      const action48 = {
        '财富':'48小时内：写出一条交易规则（入场、止损、止盈）并严格执行一次。',
        '科研':'48小时内：完成一个最小实验闭环（假设-验证-结论）。',
        '关系':'48小时内：做一次真诚沟通，明确你真正的边界与期待。',
        '事业':'48小时内：推进最卡的一项任务，并输出可见结果。',
        '成长':'48小时内：完成一个你拖延最久的小任务。'
      }[domain];

      const action7d = {
        '财富':'7天内：做一次完整复盘，记录情绪与策略偏差。',
        '科研':'7天内：形成一页实验报告，标注可复现步骤。',
        '关系':'7天内：持续一项稳定投入，避免情绪化拉扯。',
        '事业':'7天内：交付一个可展示成果（文档/代码/内容）。',
        '成长':'7天内：把目标拆成每天可执行动作并打卡。'
      }[domain];

      return `
        <strong>综合解读：</strong><br>
        ① ${labels[0]}位 <b>${cards[0].name}${cards[0].ori}</b>：${cards[0].meaning}。<br>
        ② ${labels[1]}位 <b>${cards[1].name}${cards[1].ori}</b>：${cards[1].meaning}。<br>
        ③ ${labels[2]}位 <b>${cards[2].name}${cards[2].ori}</b>：${cards[2].meaning}。<br><br>
        <strong>风险提示：</strong>${riskLine}<br>
        <strong>当前重点：</strong>${nowAdvice}<br>
        <strong>行动建议：</strong><br>
        • ${action48}<br>
        • ${action7d}<br><br>
        <strong>一句话箴言：</strong>先把可控的事做好，命运会站在行动者这一边。
      `;
    }

    function reveal(){
      const labels=spreads[state.spread];
      const cards=state.picked.map(c=>{
        const rev=Math.random()<0.42;
        return {...c,ori:rev?'逆位':'正位',meaning:rev?c.rev:c.up};
      });

      $("qText").innerHTML=`<strong>${state.name}</strong> 的问题：${state.question}`;
      $("cards").innerHTML=cards.map((c,i)=>`
        <article>
          <span class="tag">${labels[i]}</span>
          <img class="card-face" src="${c.img}" alt="${c.name}" loading="lazy" />
          <h3>${c.name} · ${c.ori}</h3>
          <p>${c.meaning}</p>
        </article>
      `).join('');

      $("summary").innerHTML=composeReading(cards, labels, state.question);
      $("result").classList.add('show');
      $("hint").textContent='占卜完成，可点击“重新开始”再来一次';
      $("result").scrollIntoView({behavior:'smooth', block:'start'});
    }

    // flow
    $("toStep2").addEventListener('click',()=>{
      const n=$("nameInput").value.trim();
      if(!n) return;
      state.name=n;
      $("step1").style.display='none';
      $("step2").style.display='block';
      $("questionInput").focus();
    });

    $("startBtn").addEventListener('click',()=>{
      const q=$("questionInput").value.trim();
      if(!q) return alert('请先输入问题');
      state.question=q;
      state.spread=$("spreadInput").value;
      hideModal();
      startReading();
    });

    $("musicBtn").addEventListener('click',async()=>{
      const audio=$("bgm");
      if(audio.paused){
        try{await audio.play(); $("musicBtn").textContent='暂停背景音乐';}
        catch{alert('浏览器拦截了自动播放，请再点一次。')}
      }else{
        audio.pause();
        $("musicBtn").textContent='开启背景音乐';
      }
    });

    $("restartBtn").addEventListener('click',()=>{
      state.picked=[];
      $("fan").classList.add('hidden');
      $("result").classList.remove('show');
      $("step1").style.display='block';
      $("step2").style.display='none';
      $("nameInput").value='';
      $("questionInput").value='';
      $("hint").textContent='静心 3 秒，再点击卡牌进行抽取';
      showModal();
    });

    buildAmbient();
    showModal(); // 打开页面即弹窗
  </script>
</body>
</html>
