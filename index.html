<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>月影塔罗店 · 动态占卜</title>
  <style>
    :root {
      --gold:#e8c57a;
      --ink:#f7f1df;
      --muted:#cdbfe0;
      --line:rgba(232,197,122,.45);
      --panel:rgba(18,10,28,.65);
      --ok:#8ff2d0;
    }
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;color:var(--ink);
      font-family:"Noto Serif SC","Microsoft YaHei",serif;
      background:#140d22;
      overflow-x:hidden;
    }

    .bg-photo{
      position:fixed;inset:0;z-index:0;
      background:
        radial-gradient(circle at 20% 70%, rgba(209,145,79,.32), transparent 35%),
        radial-gradient(circle at 80% 25%, rgba(95,60,170,.35), transparent 38%),
        linear-gradient(170deg,#221236,#140d22 65%);
      filter: blur(10px) saturate(1.1);
      transform:scale(1.05);
    }
    .bg-overlay{
      position:fixed;inset:0;z-index:1;pointer-events:none;
      background:rgba(10,6,18,.38);
    }
    .stars::before,.stars::after{
      content:"";position:fixed;inset:0;z-index:2;pointer-events:none;
      background-image:radial-gradient(circle,rgba(255,255,255,.72) 1px,transparent 1.2px);
      background-size:4px 4px;opacity:.09;animation:drift 28s linear infinite;
    }
    .stars::after{opacity:.06;animation-duration:40s;transform:scale(1.28)}
    @keyframes drift{from{transform:translateY(0)}to{transform:translateY(-28px)}}

    .wrap{position:relative;z-index:3;width:min(1100px,94vw);margin:24px auto 40px}
    .hero{
      border:1px solid var(--line);border-radius:20px;padding:20px;
      background:linear-gradient(180deg,var(--panel),rgba(19,10,29,.45));
      backdrop-filter:blur(6px);
      box-shadow:0 16px 40px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.04);
    }
    h1{margin:0 0 8px;color:var(--gold);font-size:clamp(1.5rem,2.7vw,2.2rem);letter-spacing:.06em}
    .sub{margin:0;color:var(--muted);line-height:1.7}

    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    button,.btn{
      border:1px solid rgba(232,197,122,.55);border-radius:10px;
      background:linear-gradient(180deg,rgba(232,197,122,.23),rgba(232,197,122,.08));
      color:#fff;padding:10px 14px;cursor:pointer;
    }

    .panel{margin-top:14px;border:1px solid rgba(232,197,122,.35);border-radius:14px;padding:14px;background:rgba(255,255,255,.05)}
    .hidden{display:none}

    .table-zone{margin-top:14px}
    .deck-wrap{position:relative;height:330px;display:flex;align-items:center;justify-content:center}

    .deck, .picked-row article{
      width:160px;height:240px;border-radius:12px;
      border:1px solid rgba(232,197,122,.48);
      background:
        radial-gradient(circle at 50% 28%, rgba(232,197,122,.25), transparent 34%),
        linear-gradient(165deg,#311c4a,#1a1129);
      box-shadow:0 12px 26px rgba(0,0,0,.38), inset 0 0 0 1px rgba(255,255,255,.05);
      position:relative;
      user-select:none;
    }

    .deck::before{
      content:"✦ 月影塔罗 ✦";position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);
      text-align:center;color:#f8e9c6;letter-spacing:.08em
    }

    .shuffle{animation:shuffle 1s ease-in-out infinite alternate}
    @keyframes shuffle{
      0%{transform:translateX(-16px) rotate(-7deg)}
      50%{transform:translateX(16px) rotate(7deg)}
      100%{transform:translateX(-10px) rotate(-5deg)}
    }

    .fan{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-top:10px}
    .fan .choice{
      width:150px;height:220px;border-radius:12px;cursor:pointer;
      transform:rotate(var(--r)) translateY(var(--y));
      transition:.2s transform,.2s filter;
      filter:brightness(.95);
    }
    .fan .choice:hover{transform:rotate(var(--r)) translateY(calc(var(--y) - 8px));filter:brightness(1.08)}

    .picked-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:12px}
    .picked-row article{width:100%;height:auto;min-height:270px;padding:12px;background:linear-gradient(180deg,#2a163f,#1a1029)}
    .tag{display:inline-block;padding:2px 8px;border:1px solid rgba(255,255,255,.2);border-radius:999px;color:#e6dcf7;font-size:.82rem}
    .picked-row h3{margin:.5rem 0 .4rem;color:var(--gold)}

    .summary{margin-top:12px;border-top:1px dashed rgba(232,197,122,.4);padding-top:10px;line-height:1.8}

    .modal{
      position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;
      background:rgba(8,5,13,.6);backdrop-filter:blur(4px);
    }
    .modal.show{display:flex}
    .dialog{
      width:min(560px,92vw);background:linear-gradient(180deg,rgba(35,21,52,.95),rgba(19,10,29,.95));
      border:1px solid var(--line);border-radius:14px;padding:16px;
      box-shadow:0 20px 48px rgba(0,0,0,.5);
    }
    .dialog h2{margin:0 0 8px;color:var(--gold)}
    .dialog label{display:block;margin-top:8px;color:var(--muted)}
    .dialog input,.dialog textarea,.dialog select{
      width:100%;margin-top:6px;padding:10px;border-radius:10px;
      border:1px solid rgba(255,255,255,.2);background:rgba(12,7,18,.8);color:#fff;
      font:inherit;
    }

    .dialog .actions{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
    .hint{font-size:.9rem;color:#ccbfe0}

    .footer{text-align:center;color:#b8aacb;margin-top:14px;font-size:.86rem}
  </style>
</head>
<body>
  <div class="bg-photo"></div>
  <div class="bg-overlay"></div>
  <div class="stars"></div>

  <audio id="bgm" loop preload="none" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_a8cd79be19.mp3?filename=relaxing-meditation-ambient-11157.mp3"></audio>

  <div class="wrap">
    <section class="hero">
      <h1>🔮 月影塔罗店</h1>
      <p class="sub">模糊塔罗店背景 · 洗牌动画 · 自主抽牌 · 弹窗问询流程</p>

      <div class="toolbar">
        <button id="openFlow">开始占卜</button>
        <button id="musicBtn">开启背景音乐</button>
        <span class="hint">浏览器限制自动播放，需点击一次“开启背景音乐”。</span>
      </div>

      <div class="panel table-zone">
        <div id="stageText">点击“开始占卜”，女祭司会先询问你的名字与问题。</div>

        <div class="deck-wrap" id="deckWrap">
          <div class="deck" id="deck"></div>
        </div>

        <div class="fan hidden" id="fan"></div>

        <div class="picked-row" id="pickedRow"></div>
        <div class="summary" id="summary"></div>
      </div>

      <p class="footer">* 仅供灵感与反思，不替代投资/医疗/法律等专业建议。</p>
    </section>
  </div>

  <div class="modal" id="flowModal">
    <div class="dialog">
      <h2>月影问询</h2>
      <div id="stepName">
        <label>你的名字</label>
        <input id="nameInput" placeholder="例如：甜甜" />
        <div class="actions"><button id="toQuestion">下一步</button></div>
      </div>

      <div id="stepQuestion" class="hidden">
        <label>你希望占卜的问题</label>
        <textarea id="questionInput" placeholder="例如：我今年科研与财富增长的关键机会是什么？"></textarea>
        <label>牌阵</label>
        <select id="spreadSelect">
          <option value="past-present-future">传统三牌阵（过去 / 现在 / 未来）</option>
          <option value="situation-action-outcome">情境三牌阵（现状 / 建议 / 结果）</option>
        </select>
        <div class="actions">
          <button id="startShuffle">开始洗牌</button>
          <button id="cancelFlow">取消</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const deckData = [
      {name:"愚者", up:"新旅程开启，适合勇敢尝试", rev:"冲动冒进，先补齐信息"},
      {name:"魔术师", up:"资源齐备，执行会出结果", rev:"分心消耗，行动力打折"},
      {name:"女祭司", up:"直觉很准，先观察再行动", rev:"想太多导致犹豫"},
      {name:"女皇", up:"稳步增长，利于长期布局", rev:"舒适过度，节奏放缓"},
      {name:"皇帝", up:"建立秩序，以系统取胜", rev:"控制过强导致僵化"},
      {name:"教皇", up:"借助导师体系加速学习", rev:"被旧框架束缚"},
      {name:"恋人", up:"选择与价值一致", rev:"优柔寡断，内耗增加"},
      {name:"战车", up:"推进力强，适合冲刺", rev:"急躁偏航"},
      {name:"力量", up:"稳定心态，柔性掌控", rev:"焦虑影响判断"},
      {name:"隐者", up:"沉淀思考，独立判断", rev:"封闭过头，错失反馈"},
      {name:"命运之轮", up:"转机出现，抓住窗口", rev:"波动增大，先控风险"},
      {name:"正义", up:"按规则理性决策", rev:"信息偏差导致误判"},
      {name:"倒吊人", up:"换角度会找到答案", rev:"停滞太久需主动破局"},
      {name:"死神", up:"旧阶段结束，利于重启", rev:"抗拒变化拖慢进展"},
      {name:"节制", up:"整合资源，稳中求进", rev:"节奏失衡，效率下降"},
      {name:"恶魔", up:"欲望驱动强，警惕执念", rev:"摆脱依赖重获主动"},
      {name:"高塔", up:"突发重构，打破旧模式", rev:"隐患拖延，尽快修复"},
      {name:"星星", up:"愿景清晰，值得坚持", rev:"理想化，落地不足"},
      {name:"月亮", up:"不确定中藏线索", rev:"迷雾散去，看清风险"},
      {name:"太阳", up:"曝光与回报同步提升", rev:"过度乐观忽视细节"},
      {name:"审判", up:"复盘唤醒第二机会", rev:"犹豫不决错过窗口"},
      {name:"世界", up:"阶段圆满准备升级", rev:"收尾不足功亏一篑"}
    ];

    const spreadMap = {
      "past-present-future": ["过去", "现在", "未来"],
      "situation-action-outcome": ["现状", "建议行动", "结果趋势"]
    };

    const state = {name:"", question:"", spread:"past-present-future", selected:[]};
    const $ = (id)=>document.getElementById(id);

    function shuffle(arr){
      const a=[...arr];
      for(let i=a.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
      }
      return a;
    }

    function openModal(){ $("flowModal").classList.add("show"); }
    function closeModal(){ $("flowModal").classList.remove("show"); }

    function startShuffling(){
      $("deck").classList.add("shuffle");
      $("stageText").textContent = `${state.name}，正在洗牌...请默念你的问题。`;
      $("fan").classList.add("hidden");
      $("pickedRow").innerHTML = "";
      $("summary").innerHTML = "";

      setTimeout(() => {
        $("deck").classList.remove("shuffle");
        showFan();
      }, 2600);
    }

    function showFan(){
      const cards = shuffle(deckData).slice(0, 7);
      const fan = $("fan");
      fan.innerHTML = cards.map((_,i)=>`<div class="choice deck" data-i="${i}" style="--r:${-18+i*6}deg;--y:${Math.abs(3-i)*2}px"></div>`).join("");
      fan.classList.remove("hidden");
      $("stageText").textContent = "请自主选择 3 张牌（点击牌背）";

      state.selected = [];
      [...fan.querySelectorAll('.choice')].forEach((el, idx)=>{
        el.addEventListener('click', ()=>{
          if(state.selected.length>=3 || el.dataset.locked) return;
          el.dataset.locked='1';
          el.style.opacity='.45';
          state.selected.push(cards[idx]);
          if(state.selected.length===3){
            renderReading();
            fan.classList.add('hidden');
          }
        });
      });
    }

    function renderReading(){
      const labels = spreadMap[state.spread];
      const picks = state.selected.map(c=>{
        const rev = Math.random()<0.42;
        return {...c, ori: rev?"逆位":"正位", meaning: rev?c.rev:c.up};
      });

      $("stageText").textContent = `${state.name} 的牌面已揭示`;
      $("pickedRow").innerHTML = picks.map((c,i)=>`
        <article>
          <span class="tag">${labels[i]}</span>
          <h3>${c.name} · ${c.ori}</h3>
          <p>${c.meaning}</p>
        </article>
      `).join('');

      $("summary").innerHTML = `
        <strong>问题：</strong>${state.question}<br><br>
        <strong>综合解读：</strong><br>
        ① ${labels[0]}位 <b>${picks[0].name}${picks[0].ori}</b>：先看过去策略是否仍有效。<br>
        ② ${labels[1]}位 <b>${picks[1].name}${picks[1].ori}</b>：当前关键在执行动作与节奏。<br>
        ③ ${labels[2]}位 <b>${picks[2].name}${picks[2].ori}</b>：未来趋势由你持续行动塑造。<br><br>
        建议：把问题拆成“今天1件事 + 本周3件事”，让牌意落地。
      `;
    }

    $("openFlow").addEventListener('click', ()=>{
      $("stepName").classList.remove('hidden');
      $("stepQuestion").classList.add('hidden');
      openModal();
    });

    $("toQuestion").addEventListener('click', ()=>{
      const n = $("nameInput").value.trim();
      if(!n) return;
      state.name = n;
      $("stepName").classList.add('hidden');
      $("stepQuestion").classList.remove('hidden');
      $("questionInput").focus();
    });

    $("startShuffle").addEventListener('click', ()=>{
      const q = $("questionInput").value.trim();
      if(!q){ alert('请先输入问题'); return; }
      state.question = q;
      state.spread = $("spreadSelect").value;
      closeModal();
      startShuffling();
    });

    $("cancelFlow").addEventListener('click', closeModal);

    $("musicBtn").addEventListener('click', async ()=>{
      const bgm = $("bgm");
      if(bgm.paused){
        try{
          await bgm.play();
          $("musicBtn").textContent = '暂停背景音乐';
        }catch(e){
          alert('播放失败，请再点一次或检查浏览器音频权限');
        }
      }else{
        bgm.pause();
        $("musicBtn").textContent = '开启背景音乐';
      }
    });
  </script>
</body>
</html>
